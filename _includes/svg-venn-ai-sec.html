<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" role="img" aria-label="AI and security positioning Venn diagram" style="max-width:100%;height:auto;display:block;margin:1.5rem auto;color:var(--text);">
  <defs>
    <style>
      .v-c{fill:rgba(52,152,219,0.07);stroke:#3498db;stroke-width:1.5;}
      .v-title{font:700 18px Roboto,sans-serif;fill:#3498db;letter-spacing:0.02em;}
      .v-sub{font:600 13px Roboto,sans-serif;fill:currentColor;}
      .v-b{font:400 12px Roboto,sans-serif;fill:currentColor;opacity:0.82;}
      .v-chip{fill:rgba(52,152,219,0.14);stroke:#3498db;stroke-width:1;}
      .v-chip-text{font:600 12px Roboto,sans-serif;fill:currentColor;}
      .v-section{font:700 11px Roboto,sans-serif;fill:#3498db;letter-spacing:0.1em;text-transform:uppercase;}
      .v-tag{font:600 11px Roboto,sans-serif;fill:currentColor;opacity:0.7;font-style:italic;}
    </style>
  </defs>

  <text x="310" y="22" class="v-section" text-anchor="middle">AI only</text>
  <text x="550" y="22" class="v-section" text-anchor="middle">AI × Security</text>
  <text x="790" y="22" class="v-section" text-anchor="middle">Security only</text>

  <circle cx="410" cy="280" r="240" class="v-c"/>
  <circle cx="690" cy="280" r="240" class="v-c"/>

  <!-- LEFT exclusive: AI only -->
  <text x="310" y="135" class="v-title" text-anchor="middle">Agentic AI</text>
  <text x="310" y="155" class="v-sub" text-anchor="middle">platforms for your business</text>
  <rect x="250" y="170" width="120" height="26" rx="13" class="v-chip"/>
  <text x="310" y="187" class="v-chip-text" text-anchor="middle">AgentForge</text>
  <text x="310" y="230" class="v-b" text-anchor="middle">• SOC assistant</text>
  <text x="310" y="250" class="v-b" text-anchor="middle">• Dev copilot</text>
  <text x="310" y="270" class="v-b" text-anchor="middle">• Domain RAG</text>
  <text x="310" y="290" class="v-b" text-anchor="middle">• Conditional automation</text>
  <text x="310" y="335" class="v-tag" text-anchor="middle">LangGraph · HITL · multi-LLM</text>

  <!-- CENTER overlap: AI × Security -->
  <text x="550" y="135" class="v-title" text-anchor="middle">The sweet spot</text>

  <text x="550" y="168" class="v-sub" text-anchor="middle">AI → for security</text>
  <rect x="485" y="180" width="130" height="26" rx="13" class="v-chip"/>
  <text x="550" y="197" class="v-chip-text" text-anchor="middle">Aegis Defend</text>
  <text x="550" y="225" class="v-b" text-anchor="middle">SOAR autonomous</text>
  <text x="550" y="243" class="v-b" text-anchor="middle">UEBA · MITRE RAG</text>

  <line x1="455" y1="265" x2="645" y2="265" stroke="#3498db" stroke-width="0.5" opacity="0.4"/>

  <text x="550" y="290" class="v-sub" text-anchor="middle">Security → for AI</text>
  <text x="550" y="312" class="v-b" text-anchor="middle">• LLM guardrails</text>
  <text x="550" y="330" class="v-b" text-anchor="middle">• Agent IAM · audit</text>
  <text x="550" y="348" class="v-b" text-anchor="middle">• HITL · compliance</text>

  <!-- RIGHT exclusive: Security only -->
  <text x="790" y="135" class="v-title" text-anchor="middle">Cloud security</text>
  <text x="790" y="155" class="v-sub" text-anchor="middle">fixed-price packages</text>
  <rect x="710" y="170" width="160" height="26" rx="13" class="v-chip"/>
  <text x="790" y="187" class="v-chip-text" text-anchor="middle">Security Checkup</text>
  <rect x="710" y="201" width="160" height="26" rx="13" class="v-chip"/>
  <text x="790" y="218" class="v-chip-text" text-anchor="middle">Modernization Blueprint</text>
  <rect x="710" y="232" width="160" height="26" rx="13" class="v-chip"/>
  <text x="790" y="249" class="v-chip-text" text-anchor="middle">DevSecOps Factory</text>
  <text x="790" y="280" class="v-b" text-anchor="middle">• IAM · SSO · OAuth2</text>
  <text x="790" y="300" class="v-b" text-anchor="middle">• OWASP audit</text>
  <text x="790" y="320" class="v-b" text-anchor="middle">• Legacy modernization</text>
  <text x="790" y="340" class="v-b" text-anchor="middle">• Kubernetes · Terraform</text>
</svg>
