<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 220" role="img" aria-label="Three pillars of expertise" style="max-width:100%;height:auto;display:block;margin:1.5rem auto 2rem auto;color:var(--text);">
  <defs>
    <style>
      .p-card{fill:rgba(52,152,219,0.05);stroke:#3498db;stroke-width:1.2;}
      .p-icon{fill:none;stroke:#3498db;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
      .p-icon-fill{fill:#3498db;}
      .p-title{font:700 14px Roboto,sans-serif;fill:#3498db;letter-spacing:0.02em;}
      .p-b{font:400 12px Roboto,sans-serif;fill:currentColor;opacity:0.85;}
      .p-tag{font:600 11px Roboto,sans-serif;fill:currentColor;opacity:0.65;font-style:italic;}
    </style>
  </defs>

  <!-- Pillar 1: Agentic AI -->
  <rect x="20" y="20" width="340" height="180" rx="12" class="p-card"/>
  <g transform="translate(60, 45)">
    <circle cx="10" cy="10" r="6" class="p-icon-fill"/>
    <circle cx="50" cy="10" r="6" class="p-icon-fill"/>
    <circle cx="30" cy="35" r="6" class="p-icon-fill"/>
    <circle cx="10" cy="58" r="6" class="p-icon-fill"/>
    <circle cx="50" cy="58" r="6" class="p-icon-fill"/>
    <line x1="10" y1="10" x2="30" y2="35" class="p-icon"/>
    <line x1="50" y1="10" x2="30" y2="35" class="p-icon"/>
    <line x1="30" y1="35" x2="10" y2="58" class="p-icon"/>
    <line x1="30" y1="35" x2="50" y2="58" class="p-icon"/>
  </g>
  <text x="140" y="80" class="p-title">Agentic AI</text>
  <text x="140" y="105" class="p-b">LangGraph, RAG pgvector, HITL,</text>
  <text x="140" y="125" class="p-b">guardrails LLM, multi-LLM.</text>
  <text x="140" y="175" class="p-tag">Aegis Defend · AgentForge</text>

  <!-- Pillar 2: Cloud security -->
  <rect x="380" y="20" width="340" height="180" rx="12" class="p-card"/>
  <g transform="translate(420, 45)">
    <path d="M30 0 L60 12 L60 32 Q60 52 30 64 Q0 52 0 32 L0 12 Z" class="p-icon"/>
    <path d="M16 30 L26 40 L46 22" class="p-icon"/>
  </g>
  <text x="500" y="80" class="p-title">Cloud security</text>
  <text x="500" y="105" class="p-b">IAM, SSO/OAuth2, OWASP,</text>
  <text x="500" y="125" class="p-b">DevSecOps, mTLS, audit.</text>
  <text x="500" y="175" class="p-tag">Keycloak · CI/CD · Terraform</text>

  <!-- Pillar 3: Cloud architecture -->
  <rect x="740" y="20" width="340" height="180" rx="12" class="p-card"/>
  <g transform="translate(770, 50)">
    <path d="M0 18 L30 6 L60 18 L30 30 Z" class="p-icon"/>
    <path d="M0 32 L30 20 L60 32 L30 44 Z" class="p-icon"/>
    <path d="M0 46 L30 34 L60 46 L30 58 Z" class="p-icon"/>
  </g>
  <text x="850" y="80" class="p-title">Cloud architecture</text>
  <text x="850" y="105" class="p-b">Legacy modernization, integration,</text>
  <text x="850" y="125" class="p-b">event-driven, Kubernetes / IaC.</text>
  <text x="850" y="175" class="p-tag">Spring Boot · Java 17 · Kafka</text>
</svg>
