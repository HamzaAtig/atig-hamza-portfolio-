    approach:
      - "Blueprint d'architecture et decoupage par domaines metier"
      - "Migration progressive vers Spring Boot 3 / Java 17 containerise"
      - "Deploiement Kubernetes avec ArgoCD et pipelines GitLab CI/CD"
    approach_en:
      - "Architecture blueprint and domain-driven decoupling"
      - "Phased migration to Spring Boot 3 / Java 17 containerized stack"
      - "Kubernetes deployment with ArgoCD and GitLab CI/CD pipelines"
    results:
      - "Reduction de 60% du temps de deploiement"
      - "Zero interruption de service pendant la migration"
      - "Gouvernance DevSecOps avec scans SAST/DAST integres"
    results_en:
      - "60% reduction in deployment time"
      - "Zero service disruption during migration"
      - "DevSecOps governance with integrated SAST/DAST scans"

  - title: "Securite & IAM pour une plateforme assurance"
    title_en: "Security & IAM for an insurance platform"
    context: "Plateforme d'investissement a fort volume, echanges B2B sensibles avec partenaires financiers."
    context_en: "High-volume investment platform, sensitive B2B exchanges with financial partners."
    approach:
      - "Audit OWASP Top 10 et cartographie des vulnerabilites"
      - "Deploiement SSO centralise via Keycloak (OAuth2/OIDC, MFA)"
      - "Securisation mTLS des flux inter-applicatifs"
    approach_en:
      - "OWASP Top 10 audit and vulnerability mapping"
      - "Centralized SSO deployment via Keycloak (OAuth2/OIDC, MFA)"
      - "mTLS securing inter-application flows"
    results:
      - "100% des endpoints critiques securises"
      - "Conformite reglementaire validee"
      - "Tracabilite complete des acces (audit logs)"
    results_en:
      - "100% of critical endpoints secured"
      - "Regulatory compliance validated"
      - "Full access traceability (audit logs)"

  - title: "Observabilite & fiabilisation SaaS multi-pays"
    title_en: "Multi-country SaaS observability & reliability"
    context: "Plateforme CRM omnicanale pour centres d'appels internationaux, trafic multi-pays a forts volumes."
